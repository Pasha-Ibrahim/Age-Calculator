<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="header">
      <div class="container">
        <div class="calculator">
          <h1>JavaScript <br /><span>Age Calculator</span></h1>
        </div>

        <div class="input-box">
          <input type="text" id="date" placeholder="MM/DD/YYYY" />
          <button onclick="calculateAge()">Calculate</button>
        </div>

        <div class="result">
          <p id="result"></p>
        </div>
      </div>
    </div>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
      // Flatpickr ilə input formatını təyin edirik
      flatpickr("#date", {
        dateFormat: "m/d/Y",
        maxDate: "today",
        allowInput: true
      });

      let userInput = document.getElementById("date");
      let result = document.getElementById("result");

      function calculateAge() {
        if(!userInput.value) {
          result.innerHTML = "Zəhmət olmasa tarix seçin";
          return;
        }

        // Flatpickr formatı MM/DD/YYYY olduğu üçün split edirik
        let parts = userInput.value.split('/');
        let m1 = parseInt(parts[0], 10);
        let d1 = parseInt(parts[1], 10);
        let y1 = parseInt(parts[2], 10);

        let birthDate = new Date(y1, m1 - 1, d1);

        let today = new Date();
        let d2 = today.getDate();
        let m2 = today.getMonth() + 1;
        let y2 = today.getFullYear();

        let y3 = y2 - y1;
        let m3 = m2 - m1;
        let d3 = d2 - d1;

        if(d3 < 0) {
          m3--;
          d3 += getDaysInMonth(y2, m2 - 1);
        }

        if(m3 < 0) {
          y3--;
          m3 += 12;
        }

        result.innerHTML = `Sən <span>${y3}</span> il, <span>${m3}</span> ay və <span>${d3}</span> gündür yaşayırsan`;
      }

      function getDaysInMonth(year, month) {
        return new Date(year, month + 1, 0).getDate();
      }
    </script>
  </body>
</html>
